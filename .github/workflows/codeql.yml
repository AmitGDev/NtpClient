name: "CodeQL (x64 Debug & Release)"

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]
  schedule:
    - cron: '0 6 * * 0'
  workflow_dispatch:

jobs:
  analyze:
    name: Analyze (${{ matrix.config }})
    runs-on: windows-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ['cpp']
        config: ['Debug', 'Release']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Set up MSBuild (VS2022)
        uses: microsoft/setup-msbuild@v2
        with:
          vs-version: '17.0'

      - name: Build project (${{ matrix.config }}, x64, C++23)
        shell: cmd
        run: |
          echo Setting up Developer Command Prompt...
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\Tools\VsDevCmd.bat"

          echo Building solution with C++23 standard enforced...
          msbuild /m ^
            /p:Configuration=${{ matrix.config }} ^
            /p:Platform=x64 ^
            /p:AdditionalOptions="/std:c++latest %(AdditionalOptions)" ^
            NtpClient.sln

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
